name: PR

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test-dart:
    name: Lint + Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flutter-version: ['3.41.0', 'latest']
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter-version }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage
        if: matrix.flutter-version == '3.41.0'
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          flags: dart
          token: ${{ secrets.CODECOV_TOKEN }}

  test-android:
    name: Android Build Check
    runs-on: ubuntu-latest
    needs: lint-and-test-dart
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: stable
          cache: true

      - name: Install root dependencies
        run: flutter pub get

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Generate test fixtures
        working-directory: example
        env:
          FL_ENV_MASTER_KEY: ${{ secrets.FL_ENV_MASTER_KEY }}
        run: |
          cp .env.example .env
          cp .env.staging.example .env.staging
          cp .env.production.example .env.production
          dart run fl_env build

      - name: Build example APK (debug)
        working-directory: example
        run: flutter build apk --debug

  test-ios:
    name: iOS Build Check
    runs-on: macos-latest
    needs: lint-and-test-dart
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: stable
          cache: true

      - name: Install root dependencies
        run: flutter pub get

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Generate test fixtures
        working-directory: example
        env:
          FL_ENV_MASTER_KEY: ${{ secrets.FL_ENV_MASTER_KEY }}
        run: |
          cp .env.example .env
          cp .env.staging.example .env.staging
          cp .env.production.example .env.production
          dart run fl_env build

      - name: Install CocoaPods
        working-directory: example/ios
        run: pod install

      - name: Build example iOS (debug, no codesign)
        working-directory: example
        run: flutter build ios --debug --no-codesign

  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [lint-and-test-dart, test-android, test-ios]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## PR Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint + Tests | ${{ needs.lint-and-test-dart.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Android Build | ${{ needs.test-android.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| iOS Build | ${{ needs.test-ios.result }} |" >> $GITHUB_STEP_SUMMARY
