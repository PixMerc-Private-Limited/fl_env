name: Nightly (Flutter Beta)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  flutter-beta:
    name: Flutter Beta Channel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: beta
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Run tests
        run: flutter test

  report-failure:
    name: Report Failure
    runs-on: ubuntu-latest
    needs: flutter-beta
    if: failure()
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Create failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          DATE=$(date +%Y-%m-%d)
          gh issue create \
            --title "[Nightly] Flutter Beta Failure — ${DATE}" \
            --body "The nightly Flutter Beta CI run failed on ${DATE}. See: ${RUN_URL}" \
            --label "status:beta-failure"
